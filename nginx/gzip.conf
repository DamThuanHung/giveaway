# ══════════════════════════════════════════════════════════════════
# Gzip optimized — đặt tại /etc/nginx/conf.d/gzip.conf
# Override default Ubuntu nginx (chỉ bật gzip on, thiếu types + level)
# ══════════════════════════════════════════════════════════════════

gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    text/x-component
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/rss+xml
    application/atom+xml
    application/vnd.ms-fontobject
    font/truetype
    font/opentype
    font/woff
    font/woff2
    image/svg+xml;
