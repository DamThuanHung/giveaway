# ══════════════════════════════════════════════════════════════════
# Nginx config cho Trao Tay — 3 subdomain
#   traotay.com.vn        → landing page static
#   api.traotay.com.vn    → NestJS backend (127.0.0.1:3800)
#   s3.traotay.com.vn     → MinIO (127.0.0.1:9000)
#
# Deploy:
#   sudo cp nginx/traotay.conf /etc/nginx/sites-available/traotay
#   sudo ln -s /etc/nginx/sites-available/traotay /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#   ./nginx/init-cert.sh   # lấy Let's Encrypt cert lần đầu
# ══════════════════════════════════════════════════════════════════

# ─── Rate limit zone (dùng chung) ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name traotay.com.vn www.traotay.com.vn api.traotay.com.vn s3.traotay.com.vn;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── traotay.com.vn — Landing page ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name traotay.com.vn www.traotay.com.vn;

    ssl_certificate     /etc/letsencrypt/live/traotay.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traotay.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers (CSP + HSTS + X-Frame + X-Content-Type + Referrer-Policy)
    # include ở server block → áp dụng cho location / (không có add_header riêng)
    include /etc/nginx/security-headers.conf;

    # Web serve từ Next.js static export. Build local + commit out/ → git pull → live.
    # Phase 1 manual rebuild; Phase 2 auto cron khi posts thay đổi.
    root /opt/traotay/repo/web/out;
    index index.html;

    # Next.js trailingSlash:true → mỗi page là folder/index.html
    # Thứ tự try: file trực tiếp → folder/index.html → file.html → 404
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Cache static assets (CSS/JS chunks Next.js có hash trong tên → safe long cache)
    # include lại security-headers vì location có add_header riêng → không kế thừa parent
    location /_next/static/ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache images + favicons 30 ngày
    location ~* \.(jpg|jpeg|png|webp|gif|ico|svg)$ {
        include /etc/nginx/security-headers.conf;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

# ─── api.traotay.com.vn — Backend NestJS + Socket.IO ────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.traotay.com.vn;

    ssl_certificate     /etc/letsencrypt/live/traotay.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traotay.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Giới hạn upload 10MB (app upload ảnh max 5MB × 10 ảnh đã gzip)
    client_max_body_size 60M;
    client_body_timeout 60s;

    # Rate limit cơ bản tầng Nginx (bổ sung cho ThrottlerGuard NestJS)
    limit_req zone=api_limit burst=40 nodelay;
    limit_conn addr 20;

    # ─── WebSocket (Socket.IO) — phải upgrade connection ──────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;     # WS idle timeout 24h
        proxy_send_timeout 86400s;
    }

    # ─── REST API ────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}

# ─── s3.traotay.com.vn — MinIO (ảnh public) ──────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name s3.traotay.com.vn;

    ssl_certificate     /etc/letsencrypt/live/traotay.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traotay.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # MinIO ảnh có thể lớn, cho phép 20MB upload
    client_max_body_size 20M;

    # Cache ảnh ở browser 7 ngày
    location ~* \.(jpg|jpeg|png|webp|gif)$ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
