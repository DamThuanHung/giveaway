# ══════════════════════════════════════════════════════════════════
# Nginx config cho Trao Tay — 3 subdomain
#   traotay.com.vn        → landing page static
#   api.traotay.com.vn    → NestJS backend (127.0.0.1:3800)
#   s3.traotay.com.vn     → MinIO (127.0.0.1:9000)
#
# Deploy:
#   sudo cp nginx/traotay.conf /etc/nginx/sites-available/traotay
#   sudo ln -s /etc/nginx/sites-available/traotay /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#   ./nginx/init-cert.sh   # lấy Let's Encrypt cert lần đầu
# ══════════════════════════════════════════════════════════════════

# ─── Rate limit zone (dùng chung) ────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name traotay.com.vn www.traotay.com.vn api.traotay.com.vn s3.traotay.com.vn;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── traotay.com.vn — Landing page ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name traotay.com.vn www.traotay.com.vn;

    ssl_certificate     /etc/letsencrypt/live/traotay.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traotay.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — ép browser chỉ dùng HTTPS trong 1 năm
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Landing page serve từ /opt/traotay/public — cập nhật auto khi git pull
    root /opt/traotay/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Privacy policy (redirect sang GitHub Pages hoặc serve file local)
    location = /privacy {
        return 301 https://damthuanhung.github.io/giveaway/privacy.html;
    }
}

# ─── api.traotay.com.vn — Backend NestJS + Socket.IO ────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.traotay.com.vn;

    ssl_certificate     /etc/letsencrypt/live/api.traotay.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.traotay.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Giới hạn upload 10MB (app upload ảnh max 5MB × 10 ảnh đã gzip)
    client_max_body_size 60M;
    client_body_timeout 60s;

    # Rate limit cơ bản tầng Nginx (bổ sung cho ThrottlerGuard NestJS)
    limit_req zone=api_limit burst=40 nodelay;
    limit_conn addr 20;

    # ─── WebSocket (Socket.IO) — phải upgrade connection ──────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;     # WS idle timeout 24h
        proxy_send_timeout 86400s;
    }

    # ─── REST API ────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3800;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}

# ─── s3.traotay.com.vn — MinIO (ảnh public) ──────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name s3.traotay.com.vn;

    ssl_certificate     /etc/letsencrypt/live/s3.traotay.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s3.traotay.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # MinIO ảnh có thể lớn, cho phép 20MB upload
    client_max_body_size 20M;

    # Cache ảnh ở browser 7 ngày
    location ~* \.(jpg|jpeg|png|webp|gif)$ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
