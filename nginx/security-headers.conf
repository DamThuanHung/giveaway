# ══════════════════════════════════════════════════════════════════
# Security headers — include vào mọi location block có add_header riêng
#
# WHY file riêng: nginx add_header KHÔNG kế thừa từ parent block khi
# location tự có add_header → phải lặp lại. File này tránh duplication.
# ══════════════════════════════════════════════════════════════════

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;

# unsafe-inline bắt buộc cho Next.js static export (không support nonce/hash động).
# Vẫn chặn được: external script từ domain lạ, data: URI script, javascript: href.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https://s3.traotay.com.vn https://*.tile.openstreetmap.org data: blob:; connect-src 'self' https://api.traotay.com.vn wss://api.traotay.com.vn https://cloudflareinsights.com https://*.tile.openstreetmap.org; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
