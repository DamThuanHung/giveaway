name: traotay
description: "Trao Tay — Ứng dụng mua bán & trao tặng đồ cũ cộng đồng"
publish_to: 'none'

version: 1.0.1+2

# ĐÂY LÀ ĐOẠN ANH ĐANG THIẾU (Sửa lỗi hình 11)
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- KẾT NỐI SERVER & API ---
  http: ^1.2.1
  socket_io_client: ^3.0.2

  # --- QUẢN LÝ TRẠNG THÁI ---
  provider: ^6.1.1

  # --- BẢN ĐỒ & VỊ TRÍ ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0

  # --- PUSH NOTIFICATION & AUTH ---
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  firebase_auth: ^4.19.6
  flutter_local_notifications: ^17.2.4

  # --- ANALYTICS & CRASH REPORTING ---
  firebase_analytics: ^10.10.7
  firebase_crashlytics: ^3.5.7

  # --- LƯU TRỮ & HÌNH ẢNH ---
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  share_plus: ^10.0.0
  photo_view: ^0.15.0
  google_fonts: ^6.2.1
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/categories/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_foreground_padding: 0.15