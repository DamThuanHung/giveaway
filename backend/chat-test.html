<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Test — Typing Indicator</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
  #setup { background: #fff; padding: 16px; border-bottom: 1px solid #ddd; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  #setup input, #setup select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
  #setup button { padding: 6px 14px; background: #10b981; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #setup button:hover { background: #059669; }
  #status { font-size: 12px; color: #888; margin-left: auto; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 60%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-break: break-word; }
  .msg.me { background: #10b981; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.other { background: #fff; color: #222; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .msg .meta { font-size: 11px; opacity: 0.7; margin-top: 4px; }
  #typing-indicator { padding: 0 16px 6px; display: none; }
  #typing-indicator.show { display: flex; align-items: center; gap: 6px; }
  .dots { display: flex; gap: 4px; background: #fff; padding: 10px 14px; border-radius: 18px; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .dot { width: 7px; height: 7px; background: #999; border-radius: 50%; animation: bounce 0.8s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  #footer { background: #fff; padding: 10px 16px; border-top: 1px solid #ddd; display: flex; gap: 8px; }
  #footer input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
  #footer button { padding: 10px 20px; background: #10b981; color: #fff; border: none; border-radius: 24px; cursor: pointer; font-weight: 600; }
  .sys { text-align: center; font-size: 12px; color: #aaa; font-style: italic; }
</style>
</head>
<body>

<div id="setup">
  <label style="font-size:13px;font-weight:600">Server:</label>
  <input id="serverUrl" value="http://192.168.0.108:4000" style="width:220px">
  <label style="font-size:13px;font-weight:600">Room ID:</label>
  <input id="roomId" value="cmo27d4t4002nwcgcd29bs2xw" style="width:200px">
  <label style="font-size:13px;font-weight:600">Tên:</label>
  <input id="myName" value="Trình duyệt" style="width:120px">
  <label style="font-size:13px;font-weight:600">Sender ID:</label>
  <input id="senderId" value="browser-user-1" style="width:160px">
  <button onclick="connect()">Kết nối</button>
  <span id="status">⚪ Chưa kết nối</span>
</div>

<div id="chat"></div>

<div id="typing-indicator">
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <span id="typing-name" style="font-size:12px;color:#888"></span>
</div>

<div id="footer">
  <input id="msgInput" placeholder="Nhập tin nhắn..." onkeydown="handleKey(event)" oninput="handleInput()" disabled>
  <button onclick="send()" id="sendBtn" disabled>Gửi</button>
</div>

<script>
let socket = null;
let typingTimer = null;
let isTyping = false;

function connect() {
  const url = document.getElementById('serverUrl').value;
  const roomId = document.getElementById('roomId').value;

  if (socket) socket.disconnect();

  socket = io(url, { transports: ['websocket'], query: { roomId } });

  socket.on('connect', () => {
    setStatus('🟢 Đã kết nối', 'green');
    socket.emit('joinRoom', { roomId });
    document.getElementById('msgInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    addSystemMsg('Đã kết nối vào phòng: ' + roomId);
  });

  socket.on('disconnect', () => setStatus('🔴 Mất kết nối', 'red'));
  socket.on('connect_error', () => setStatus('🔴 Lỗi kết nối', 'red'));

  socket.on('receive_message', (msg) => {
    const senderId = document.getElementById('senderId').value;
    const isMe = msg.senderId === senderId;
    addMessage(msg.text, isMe, msg.senderId);
    hideTyping();
  });

  socket.on('typing', (data) => {
    const senderId = document.getElementById('senderId').value;
    if (data.senderId !== senderId) showTyping(data.senderId);
  });

  socket.on('stop_typing', (data) => {
    const senderId = document.getElementById('senderId').value;
    if (data.senderId !== senderId) hideTyping();
  });
}

function setStatus(text, color) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.style.color = color;
}

function handleKey(e) {
  if (e.key === 'Enter') send();
}

function handleInput() {
  if (!socket) return;
  const roomId = document.getElementById('roomId').value;
  const senderId = document.getElementById('senderId').value;
  const text = document.getElementById('msgInput').value;

  if (text.length > 0) {
    if (!isTyping) {
      isTyping = true;
      socket.emit('typing', { roomId, senderId });
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      isTyping = false;
      socket.emit('stop_typing', { roomId, senderId });
    }, 2000);
  } else {
    isTyping = false;
    clearTimeout(typingTimer);
    socket.emit('stop_typing', { roomId, senderId });
  }
}

function send() {
  if (!socket) return;
  const text = document.getElementById('msgInput').value.trim();
  if (!text) return;
  const roomId = document.getElementById('roomId').value;
  const senderId = document.getElementById('senderId').value;

  clearTimeout(typingTimer);
  isTyping = false;
  socket.emit('sendMessage', { roomId, senderId, text });
  document.getElementById('msgInput').value = '';
}

function addMessage(text, isMe, senderId) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'other');
  div.innerHTML = `${text}<div class="meta">${isMe ? 'Bạn' : senderId}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addSystemMsg(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'sys';
  div.textContent = text;
  chat.appendChild(div);
}

function showTyping(senderId) {
  document.getElementById('typing-indicator').classList.add('show');
  document.getElementById('typing-name').textContent = senderId + ' đang nhập...';
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function hideTyping() {
  document.getElementById('typing-indicator').classList.remove('show');
}
</script>
</body>
</html>
