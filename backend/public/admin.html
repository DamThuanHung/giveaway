<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trao Tay — Quản trị</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#10B981;--primary-dark:#059669;--primary-light:#D1FAE5;
  --error:#EF4444;--warning:#F59E0B;--text:#1A1A2E;--text2:#6B7280;
  --bg:#F7F8FA;--white:#fff;--border:#E2E5EA;--radius:10px;
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.auth-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.auth-logo-icon{width:44px;height:44px;border-radius:12px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:22px}
.auth-logo-text{font-size:22px;font-weight:800;color:var(--text)}
.auth-card h2{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center}
.auth-card p{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px}
input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;transition:border .2s;background:var(--bg)}
input:focus{border-color:var(--primary)}
.otp-row{display:flex;gap:8px;justify-content:space-between}
.otp-row input{text-align:center;font-size:20px;font-weight:700;padding:12px 0;width:48px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff;width:100%;margin-top:20px}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-link{background:none;color:var(--primary);padding:8px 4px;font-size:13px;width:auto;margin-top:8px}
.btn-link:hover{text-decoration:underline}
.form-group{margin-bottom:16px}
.err{color:var(--error);font-size:13px;margin-top:10px;display:none}
/* LAYOUT */
#app-screen{display:none;min-height:100vh}
header{position:fixed;top:0;left:0;right:0;height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100}
header .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
header .logo-icon{width:30px;height:30px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px}
header .spacer{flex:1}
header .user-info{font-size:13px;color:var(--text2)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.btn-logout:hover{color:var(--error);border-color:var(--error)}
.content{margin-top:56px;padding:20px}
/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:56px;z-index:90}
.tab{padding:14px 20px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:6px}
.stat-value{font-size:28px;font-weight:800}
.stat-label{font-size:12px;color:var(--text2);font-weight:500}
.section-title{font-size:15px;font-weight:700;margin-bottom:14px}
.mini-stats{display:flex;gap:12px;margin-bottom:24px}
.mini-stat{flex:1;background:var(--primary-light);border-radius:10px;padding:14px;text-align:center}
.mini-stat .v{font-size:22px;font-weight:800;color:var(--primary-dark)}
.mini-stat .l{font-size:11px;color:var(--primary-dark);margin-top:2px}
.bar-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:24px}
.bar-row{margin-bottom:14px}
.bar-row:last-child{margin-bottom:0}
.bar-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-track{height:8px;border-radius:4px;background:#eee;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.alert-card{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.alert-card .icon{font-size:20px}
.alert-card .msg{flex:1;font-weight:600;color:var(--error)}
.btn-sm{padding:6px 14px;font-size:13px;font-weight:600;border-radius:8px;border:none;cursor:pointer}
.btn-orange{background:#FEF3C7;color:#92400E}
.btn-orange:hover{background:#FDE68A}
.btn-red{background:#FEE2E2;color:var(--error)}
.btn-red:hover{background:#FECACA}
.btn-grey{background:#F3F4F6;color:var(--text2)}
.btn-grey:hover{background:#E5E7EB}
.btn-green{background:var(--primary-light);color:var(--primary-dark)}
.btn-green:hover{background:#A7F3D0}
/* TABLE/LIST */
.search-row{display:flex;gap:10px;margin-bottom:16px}
.search-row input{flex:1}
.search-row .btn-sm{padding:0 18px;height:42px}
.item-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.item-card .title{font-weight:700;font-size:14px;margin-bottom:4px}
.item-card .meta{font-size:12px;color:var(--text2);margin-bottom:10px}
.item-actions{display:flex;gap:8px}
.chip{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.chip-green{background:var(--primary-light);color:var(--primary-dark)}
.chip-grey{background:#F3F4F6;color:var(--text2)}
.chip-blue{background:#EFF6FF;color:#1D4ED8}
.chip-orange{background:#FEF3C7;color:#92400E}
.chip-red{background:#FEE2E2;color:var(--error)}
.user-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.user-info-col{flex:1}
.user-info-col .name{font-weight:700}
.user-info-col .sub{font-size:12px;color:var(--text2)}
/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);gap:10px}
.spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:15px}
.load-more{text-align:center;padding:20px}
.load-more button{background:none;border:1.5px solid var(--border);color:var(--text2);padding:10px 28px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.load-more button:hover{border-color:var(--primary);color:var(--primary)}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#1A1A2E;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:9999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🤝</div>
      <span class="auth-logo-text">Trao Tay</span>
    </div>
    <h2>Đăng nhập quản trị</h2>
    <p>Dành cho tài khoản admin</p>

    <div id="step-email">
      <div class="form-group">
        <label>EMAIL</label>
        <input id="email-input" type="email" placeholder="admin@example.com" autocomplete="email"/>
      </div>
      <div class="err" id="email-err"></div>
      <button class="btn btn-primary" id="send-otp-btn" onclick="sendOtp()">Gửi mã OTP</button>
    </div>

    <div id="step-otp" style="display:none">
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Nhập mã OTP đã gửi đến <strong id="otp-email-display"></strong></p>
      <div class="otp-row" id="otp-row"></div>
      <div class="err" id="otp-err"></div>
      <button class="btn btn-primary" id="verify-otp-btn" onclick="verifyOtp()">Xác nhận</button>
      <div style="text-align:center;margin-top:10px">
        <button class="btn btn-link" onclick="backToEmail()">← Đổi email</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="logo"><div class="logo-icon">🤝</div>Trao Tay Admin</div>
    <div class="spacer"></div>
    <span class="user-info" id="header-user"></span>
    <button class="btn-logout" onclick="logout()">Đăng xuất</button>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">📊 Tổng quan</button>
    <button class="tab" onclick="switchTab(1)">📦 Bài đăng</button>
    <button class="tab" onclick="switchTab(2)">👤 Người dùng</button>
    <button class="tab" onclick="switchTab(3)">🚩 Báo cáo</button>
  </div>

  <div class="content">
    <div id="tab-stats"></div>
    <div id="tab-posts" style="display:none"></div>
    <div id="tab-users" style="display:none"></div>
    <div id="tab-reports" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = 'https://giveaway-production-e88c.up.railway.app';
let token = localStorage.getItem('admin_token') || '';
let currentTab = 0;
const state = {
  posts: [], postsPage: 0, postsTotalPages: 1, postsSearch: '',
  users: [], usersPage: 0, usersTotalPages: 1, usersSearch: '',
  reports: [], reportsPage: 0, reportsTotalPages: 1,
};

// ── Auth ──────────────────────────────────────────────────────────────────────

async function sendOtp() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  if (!email || !email.includes('@')) { showErr('email-err', 'Vui lòng nhập email hợp lệ'); return; }
  showErr('email-err', '');
  const btn = document.getElementById('send-otp-btn');
  btn.disabled = true; btn.textContent = 'Đang gửi...';
  try {
    const res = await fetch(`${BASE}/user/admin-login/send`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email}),
    });
    const data = await res.json();
    if (!res.ok) { showErr('email-err', data.message || 'Email này không có quyền truy cập'); btn.disabled=false; btn.textContent='Gửi mã OTP'; return; }
    document.getElementById('otp-email-display').textContent = email;
    document.getElementById('step-email').style.display = 'none';
    document.getElementById('step-otp').style.display = 'block';
    buildOtpBoxes();
  } catch(e) { showErr('email-err', 'Không kết nối được server'); btn.disabled=false; btn.textContent='Gửi mã OTP'; }
}

function buildOtpBoxes() {
  const row = document.getElementById('otp-row');
  row.innerHTML = '';
  for(let i=0;i<6;i++) {
    const inp = document.createElement('input');
    inp.type='tel'; inp.maxLength=1; inp.id=`otp-${i}`;
    inp.addEventListener('input', e => {
      if(e.target.value.length===1 && i<5) document.getElementById(`otp-${i+1}`).focus();
      if(e.target.value.length===1 && i===5) verifyOtp();
    });
    inp.addEventListener('keydown', e => {
      if(e.key==='Backspace' && !e.target.value && i>0) { document.getElementById(`otp-${i-1}`).focus(); document.getElementById(`otp-${i-1}`).value=''; }
    });
    row.appendChild(inp);
  }
  document.getElementById('otp-0').focus();
}

async function verifyOtp() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  let code = '';
  for(let i=0;i<6;i++) code += document.getElementById(`otp-${i}`)?.value || '';
  if(code.length !== 6) { showErr('otp-err','Nhập đủ 6 chữ số'); return; }
  showErr('otp-err','');
  const btn = document.getElementById('verify-otp-btn');
  btn.disabled=true; btn.textContent='Đang xác nhận...';
  try {
    const res = await fetch(`${BASE}/user/email-login/verify`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, otp: code}),
    });
    const data = await res.json();
    if(!res.ok) { showErr('otp-err', data.message || 'OTP không đúng'); btn.disabled=false; btn.textContent='Xác nhận'; return; }
    if(data.user?.role !== 'admin') {
      showErr('otp-err','Tài khoản này không có quyền admin'); btn.disabled=false; btn.textContent='Xác nhận'; return;
    }
    token = data.accessToken;
    localStorage.setItem('admin_token', token);
    localStorage.setItem('admin_name', data.user?.name || email);
    initApp();
  } catch(e) { showErr('otp-err','Lỗi xác nhận'); btn.disabled=false; btn.textContent='Xác nhận'; }
}

function backToEmail() {
  document.getElementById('step-otp').style.display='none';
  document.getElementById('step-email').style.display='block';
  document.getElementById('send-otp-btn').disabled=false;
  document.getElementById('send-otp-btn').textContent='Gửi mã OTP';
}

function logout() {
  token=''; localStorage.removeItem('admin_token'); localStorage.removeItem('admin_name');
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('step-email').style.display='block';
  document.getElementById('step-otp').style.display='none';
  document.getElementById('send-otp-btn').disabled=false;
  document.getElementById('send-otp-btn').textContent='Gửi mã OTP';
}

// ── App init ──────────────────────────────────────────────────────────────────

function initApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('header-user').textContent = localStorage.getItem('admin_name') || '';
  switchTab(0);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===tab));
  ['stats','posts','users','reports'].forEach((id,i) => {
    document.getElementById(`tab-${id}`).style.display = i===tab?'block':'none';
  });
  if(tab===0) loadStats();
  else if(tab===1 && state.posts.length===0) loadPosts(true);
  else if(tab===2 && state.users.length===0) loadUsers(true);
  else if(tab===3 && state.reports.length===0) loadReports(true);
}

// ── API helpers ───────────────────────────────────────────────────────────────

async function api(path, opts={}) {
  const res = await fetch(`${BASE}${path}`, {
    ...opts,
    headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{})},
  });
  if(res.status===401) { logout(); return null; }
  return res.ok ? res.json() : null;
}

// ── Stats ─────────────────────────────────────────────────────────────────────

async function loadStats() {
  const el = document.getElementById('tab-stats');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Đang tải...</div>';
  const data = await api('/admin/stats');
  if(!data) { el.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Không tải được dữ liệu</p></div>'; return; }
  const ov=data.overview||{}, td=data.today||{}, posts=data.posts||{}, mod=data.moderation||{};
  const colors=['#10B981','#3B82F6','#F59E0B','#8B5CF6'];
  el.innerHTML = `
    ${mod.pendingReports>0?`<div class="alert-card"><span class="icon">⚠️</span><span class="msg">Có ${mod.pendingReports} báo cáo chờ xử lý</span><button class="btn-sm btn-orange" onclick="switchTab(3)">Xem ngay</button></div>`:''}
    <div class="stats-grid">
      ${[['Người dùng',ov.totalUsers||0,'👤',colors[0]],['Bài đăng',ov.totalPosts||0,'📦',colors[1]],['Giao dịch',ov.totalDeals||0,'🤝',colors[2]],['Đánh giá TB',(data.avgRating||0)+'⭐','⭐',colors[3]]].map(([l,v,ic,c])=>`
      <div class="stat-card">
        <div style="font-size:24px">${ic}</div>
        <div class="stat-value" style="color:${c}">${v}</div>
        <div class="stat-label">${l}</div>
      </div>`).join('')}
    </div>
    <div class="section-title">Hoạt động hôm nay</div>
    <div class="mini-stats">
      <div class="mini-stat"><div class="v">${td.newUsers||0}</div><div class="l">Người mới</div></div>
      <div class="mini-stat"><div class="v">${td.newPosts||0}</div><div class="l">Bài mới</div></div>
      <div class="mini-stat"><div class="v">${td.newDeals||0}</div><div class="l">Deal mới</div></div>
    </div>
    <div class="section-title">Trạng thái bài đăng</div>
    <div class="bar-card">
      ${barRow('Đang hiển thị', posts.available||0, ov.totalPosts||1, '#10B981')}
      ${barRow('Đã hoàn tất', posts.done||0, ov.totalPosts||1, '#3B82F6')}
      ${barRow('Trạng thái khác', posts.other||0, ov.totalPosts||1, '#F59E0B')}
    </div>
  `;
}

function barRow(label, value, total, color) {
  const pct = total>0 ? Math.round(value/total*100) : 0;
  return `<div class="bar-row">
    <div class="bar-meta"><span>${label}</span><strong style="color:${color}">${value}</strong></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

// ── Posts ─────────────────────────────────────────────────────────────────────

async function loadPosts(reset=false) {
  if(reset) { state.posts=[]; state.postsPage=0; state.postsTotalPages=1; }
  renderPosts(true);
  const page = state.postsPage+1;
  const params = new URLSearchParams({page, limit:20});
  if(state.postsSearch) params.set('search', state.postsSearch);
  const data = await api(`/admin/posts?${params}`);
  if(!data) return;
  state.posts.push(...(data.data||[]));
  state.postsPage = data.meta?.page || page;
  state.postsTotalPages = data.meta?.totalPages || 1;
  renderPosts(false);
}

function renderPosts(loading) {
  const el = document.getElementById('tab-posts');
  const searchHtml = `<div class="search-row">
    <input id="posts-search" type="text" placeholder="Tìm bài đăng..." value="${state.postsSearch}" onkeydown="if(event.key==='Enter'){state.postsSearch=this.value;loadPosts(true)}"/>
    <button class="btn-sm btn-primary" style="background:var(--primary);color:#fff;border:none;height:42px;padding:0 18px;border-radius:var(--radius);cursor:pointer;font-weight:600" onclick="state.postsSearch=document.getElementById('posts-search').value;loadPosts(true)">Tìm</button>
  </div>`;
  if(loading && state.posts.length===0) { el.innerHTML=searchHtml+'<div class="loading"><div class="spinner"></div> Đang tải...</div>'; return; }
  if(!loading && state.posts.length===0) { el.innerHTML=searchHtml+'<div class="empty"><div class="empty-icon">📦</div><p>Không có bài đăng nào</p></div>'; return; }
  const items = state.posts.map((p,i) => `
    <div class="item-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div class="title">${esc(p.title||'')}</div>
        ${chipStatus(p.status)}
      </div>
      <div class="meta">${esc(p.author?.name||'Ẩn danh')} · ${p.viewCount||0} lượt xem</div>
      <div class="item-actions">
        <button class="btn-sm btn-orange" onclick="hidePost('${p.id}',${i})">Ẩn bài</button>
        <button class="btn-sm btn-red" onclick="deletePost('${p.id}',${i},'${esc(p.title||'')}')">Xóa</button>
      </div>
    </div>`).join('');
  const loadMore = state.postsPage < state.postsTotalPages
    ? `<div class="load-more"><button onclick="loadPosts()">${loading?'Đang tải...':'Tải thêm'}</button></div>` : '';
  el.innerHTML = searchHtml + items + loadMore;
}

async function hidePost(id, idx) {
  if(!confirm('Ẩn bài đăng này?')) return;
  await api(`/admin/posts/${id}/hide`, {method:'PATCH'});
  state.posts[idx].status='hidden'; renderPosts(false); toast('Đã ẩn bài');
}

async function deletePost(id, idx, title) {
  if(!confirm(`Xóa bài "${title}"? Không thể khôi phục.`)) return;
  await api(`/admin/posts/${id}`, {method:'DELETE'});
  state.posts.splice(idx,1); renderPosts(false); toast('Đã xóa bài');
}

// ── Users ─────────────────────────────────────────────────────────────────────

async function loadUsers(reset=false) {
  if(reset) { state.users=[]; state.usersPage=0; state.usersTotalPages=1; }
  renderUsers(true);
  const page = state.usersPage+1;
  const params = new URLSearchParams({page, limit:20});
  if(state.usersSearch) params.set('search', state.usersSearch);
  const data = await api(`/admin/users?${params}`);
  if(!data) return;
  state.users.push(...(data.data||[]));
  state.usersPage = data.meta?.page || page;
  state.usersTotalPages = data.meta?.totalPages || 1;
  renderUsers(false);
}

function renderUsers(loading) {
  const el = document.getElementById('tab-users');
  const searchHtml = `<div class="search-row">
    <input id="users-search" type="text" placeholder="Tìm người dùng..." value="${state.usersSearch}" onkeydown="if(event.key==='Enter'){state.usersSearch=this.value;loadUsers(true)}"/>
    <button class="btn-sm btn-primary" style="background:var(--primary);color:#fff;border:none;height:42px;padding:0 18px;border-radius:var(--radius);cursor:pointer;font-weight:600" onclick="state.usersSearch=document.getElementById('users-search').value;loadUsers(true)">Tìm</button>
  </div>`;
  if(loading && state.users.length===0) { el.innerHTML=searchHtml+'<div class="loading"><div class="spinner"></div> Đang tải...</div>'; return; }
  if(!loading && state.users.length===0) { el.innerHTML=searchHtml+'<div class="empty"><div class="empty-icon">👤</div><p>Không có người dùng nào</p></div>'; return; }
  const items = state.users.map((u,i) => {
    const banned = u.isBanned===true;
    const cnt = u._count||{};
    const avatarColor = avatarBg(u.name||'U');
    const initials = (u.name||'U')[0].toUpperCase();
    return `<div class="item-card">
      <div class="user-row">
        <div class="avatar" style="background:${avatarColor}">${initials}</div>
        <div class="user-info-col">
          <div class="name">${esc(u.name||'')}
            ${u.role==='admin'?'<span class="chip chip-blue" style="margin-left:6px">Admin</span>':''}
            ${banned?'<span class="chip chip-red" style="margin-left:6px">Bị khóa</span>':''}
          </div>
          <div class="sub">${esc(u.email||u.phone||'')} · ${cnt.posts||0} bài · ${cnt.dealsAsRequester||0} deal</div>
        </div>
        ${u.role!=='admin'?`<button class="btn-sm ${banned?'btn-green':'btn-red'}" onclick="banUser('${u.id}',${i},${!banned})">${banned?'Mở khóa':'Khóa'}</button>`:''}
      </div>
    </div>`;
  }).join('');
  const loadMore = state.usersPage < state.usersTotalPages
    ? `<div class="load-more"><button onclick="loadUsers()">${loading?'Đang tải...':'Tải thêm'}</button></div>` : '';
  el.innerHTML = searchHtml + items + loadMore;
}

async function banUser(id, idx, ban) {
  const msg = ban ? 'Khóa tài khoản này?' : 'Mở khóa tài khoản này?';
  if(!confirm(msg)) return;
  await api(`/admin/users/${id}/ban`, {method:'PATCH', body:JSON.stringify({isBanned:ban})});
  state.users[idx].isBanned=ban; renderUsers(false);
  toast(ban ? 'Đã khóa tài khoản' : 'Đã mở khóa');
}

// ── Reports ───────────────────────────────────────────────────────────────────

async function loadReports(reset=false) {
  if(reset) { state.reports=[]; state.reportsPage=0; state.reportsTotalPages=1; }
  renderReports(true);
  const page = state.reportsPage+1;
  const data = await api(`/admin/reports?page=${page}&limit=20`);
  if(!data) return;
  state.reports.push(...(data.data||[]));
  state.reportsPage = data.meta?.page || page;
  state.reportsTotalPages = data.meta?.totalPages || 1;
  renderReports(false);
}

function renderReports(loading) {
  const el = document.getElementById('tab-reports');
  if(loading && state.reports.length===0) { el.innerHTML='<div class="loading"><div class="spinner"></div> Đang tải...</div>'; return; }
  if(!loading && state.reports.length===0) { el.innerHTML='<div class="empty"><div class="empty-icon">🚩</div><p>Không có báo cáo nào</p></div>'; return; }
  const items = state.reports.map((r,i) => {
    const isPending = r.status==='pending';
    return `<div class="item-card" style="${isPending?'border-color:#FCD34D':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div class="title">${esc(r.post?.title||'')}</div>
        ${chipStatus(r.status)}
      </div>
      <div class="meta">Lý do: ${esc(r.reason||'')} · Báo bởi: ${esc(r.user?.name||'')}</div>
      ${isPending?`<div class="item-actions">
        <button class="btn-sm btn-orange" onclick="resolveReport('${r.id}',${i},'resolved')">Ẩn bài & xử lý</button>
        <button class="btn-sm btn-grey" onclick="resolveReport('${r.id}',${i},'dismissed')">Bỏ qua</button>
      </div>`:''}
    </div>`;
  }).join('');
  const loadMore = state.reportsPage < state.reportsTotalPages
    ? `<div class="load-more"><button onclick="loadReports()">${loading?'Đang tải...':'Tải thêm'}</button></div>` : '';
  el.innerHTML = items + loadMore;
}

async function resolveReport(id, idx, action) {
  await api(`/admin/reports/${id}`, {method:'PATCH', body:JSON.stringify({action})});
  state.reports[idx].status=action; renderReports(false);
  toast(action==='resolved' ? 'Đã xử lý & ẩn bài' : 'Đã bỏ qua báo cáo');
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function chipStatus(s) {
  const map={available:['Hiển thị','chip-green'],hidden:['Ẩn','chip-grey'],done:['Xong','chip-blue'],pending:['Chờ xử lý','chip-orange'],resolved:['Đã xử lý','chip-green'],dismissed:['Bỏ qua','chip-grey']};
  const [l,c]=map[s]||[s,'chip-grey'];
  return `<span class="chip ${c}" style="flex-shrink:0">${l}</span>`;
}
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function showErr(id,msg){ const el=document.getElementById(id);el.textContent=msg;el.style.display=msg?'block':'none'; }
function toast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500); }
function avatarBg(name) {
  const colors=['#26A69A','#42A5F5','#EF5350','#AB47BC','#FF7043','#66BB6A','#EC407A','#5C6BC0'];
  return colors[name.charCodeAt(0)%colors.length];
}

// ── Startup ───────────────────────────────────────────────────────────────────
if(token) initApp();
</script>
