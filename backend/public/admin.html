<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trao Tay — Quản trị</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#10B981;--primary-dark:#059669;--primary-light:#D1FAE5;
  --error:#EF4444;--warning:#F59E0B;--info:#3B82F6;--purple:#8B5CF6;
  --text:#1A1A2E;--text2:#6B7280;--text3:#9CA3AF;
  --bg:#F7F8FA;--white:#fff;--border:#E2E5EA;--radius:10px;
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
body.modal-open{overflow:hidden}
button{font-family:inherit}
/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.auth-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.auth-logo-icon{width:44px;height:44px;border-radius:12px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:22px}
.auth-logo-text{font-size:22px;font-weight:800;color:var(--text)}
.auth-card h2{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center}
.auth-card p{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px}
.auth-tagline{font-size:12px;color:var(--text3);text-align:center;font-style:italic;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px}
input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;transition:border .2s;background:var(--bg);font-family:inherit}
input:focus{border-color:var(--primary)}
.otp-row{display:flex;gap:8px;justify-content:space-between}
.otp-row input{text-align:center;font-size:20px;font-weight:700;padding:12px 0;width:48px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff;width:100%;margin-top:20px}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-link{background:none;color:var(--primary);padding:8px 4px;font-size:13px;width:auto;margin-top:8px}
.btn-link:hover{text-decoration:underline}
.btn-link:disabled{opacity:.5;cursor:not-allowed;text-decoration:none}
.form-group{margin-bottom:16px}
.err{color:var(--error);font-size:13px;margin-top:10px;display:none}
/* LAYOUT */
#app-screen{display:none;min-height:100vh}
header{position:fixed;top:0;left:0;right:0;height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100}
header .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
header .logo-icon{width:30px;height:30px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px}
header .spacer{flex:1}
header .user-info{font-size:13px;color:var(--text2)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.btn-logout:hover{color:var(--error);border-color:var(--error)}
.btn-refresh{background:var(--primary-light);border:none;color:var(--primary-dark);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-refresh:hover{background:#A7F3D0}
.auto-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none}
.auto-toggle input{width:auto;margin:0}
.content{margin-top:56px;padding:20px}
/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:56px;z-index:90}
.tab{padding:14px 20px;border:none;background:none;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:6px}
.stat-value{font-size:28px;font-weight:800}
.stat-label{font-size:12px;color:var(--text2);font-weight:500}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px}
.stat-sub.pos{color:var(--primary-dark)}
.stat-sub.neg{color:var(--error)}
.section-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.mini-stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.mini-stat{flex:1;min-width:90px;background:var(--primary-light);border-radius:10px;padding:14px;text-align:center}
.mini-stat .v{font-size:22px;font-weight:800;color:var(--primary-dark)}
.mini-stat .l{font-size:11px;color:var(--primary-dark);margin-top:2px}
.bar-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:24px}
.bar-row{margin-bottom:14px}
.bar-row:last-child{margin-bottom:0}
.bar-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-track{height:8px;border-radius:4px;background:#eee;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.alert-card{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.alert-card .icon{font-size:20px}
.alert-card .msg{flex:1;font-weight:600;color:var(--error)}
.btn-sm{padding:6px 14px;font-size:13px;font-weight:600;border-radius:8px;border:none;cursor:pointer}
.btn-orange{background:#FEF3C7;color:#92400E}
.btn-orange:hover{background:#FDE68A}
.btn-red{background:#FEE2E2;color:var(--error)}
.btn-red:hover{background:#FECACA}
.btn-grey{background:#F3F4F6;color:var(--text2)}
.btn-grey:hover{background:#E5E7EB}
.btn-green{background:var(--primary-light);color:var(--primary-dark)}
.btn-green:hover{background:#A7F3D0}
.btn-blue{background:#DBEAFE;color:#1D4ED8}
.btn-blue:hover{background:#BFDBFE}
.btn-purple{background:#EDE9FE;color:#6D28D9}
.btn-purple:hover{background:#DDD6FE}
/* TABLE/LIST */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:200px}
.toolbar .btn-sm{padding:0 16px;height:42px}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fchip{padding:6px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s}
.fchip:hover{border-color:var(--primary)}
.fchip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.item-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:8px;cursor:pointer;transition:border .15s}
.item-card:hover{border-color:var(--primary)}
.item-card .title{font-weight:700;font-size:14px;margin-bottom:4px}
.item-card .meta{font-size:12px;color:var(--text2);margin-bottom:10px}
.item-actions{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.chip-green{background:var(--primary-light);color:var(--primary-dark)}
.chip-grey{background:#F3F4F6;color:var(--text2)}
.chip-blue{background:#EFF6FF;color:#1D4ED8}
.chip-orange{background:#FEF3C7;color:#92400E}
.chip-red{background:#FEE2E2;color:var(--error)}
.chip-purple{background:#EDE9FE;color:#6D28D9}
.user-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-info-col{flex:1;min-width:0}
.user-info-col .name{font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.user-info-col .sub{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* PAGINATION INDICATOR */
.pagination-info{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:12px;color:var(--text2)}
.pagination-info strong{color:var(--text)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:16px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 12px 32px rgba(0,0,0,.15)}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:1}
.modal-header h3{font-size:16px;font-weight:700;flex:1}
.modal-close{background:none;border:none;font-size:22px;color:var(--text2);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:20px}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px;gap:12px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--text2);font-weight:500;flex-shrink:0}
.kv .v{font-weight:600;text-align:right;word-break:break-word;flex:1}
.modal-images{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
.modal-images img{width:100px;height:100px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer}
.modal-actions{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;background:var(--bg);border-radius:0 0 16px 16px}
.history-row{font-size:12px;color:var(--text2);padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:6px}
.history-row b{color:var(--text)}
/* TOP WIDGETS */
.top-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.top-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px}
.top-card h4{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text2)}
.top-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px;cursor:pointer}
.top-row:last-child{border-bottom:none}
.top-row:hover{background:var(--bg);margin:0 -8px;padding:8px;border-radius:6px}
.top-row .rank{font-weight:700;color:var(--text3);width:18px;flex-shrink:0}
.top-row .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.top-row .stat{color:var(--primary-dark);font-weight:700;flex-shrink:0;font-size:12px}
/* TIMELINE CHART */
.chart-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:20px}
.chart-svg{width:100%;height:140px}
.chart-bar{fill:var(--primary);opacity:.85;transition:opacity .15s}
.chart-bar:hover{opacity:1}
.chart-axis{stroke:var(--border);stroke-width:1}
.chart-label{font-size:10px;fill:var(--text3)}
.range-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.range-toolbar input[type=date]{flex:0 0 auto;width:auto;min-width:140px}
/* AUDIT LOG */
.audit-row{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px}
.audit-row .meta{font-size:11px;color:var(--text3);margin-top:2px}
.audit-action{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:var(--primary-light);color:var(--primary-dark);margin-right:8px}
.audit-action.danger{background:#FEE2E2;color:var(--error)}
.audit-action.warn{background:#FEF3C7;color:#92400E}
/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);gap:10px}
.spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:15px}
.load-more{text-align:center;padding:20px}
.load-more button{background:none;border:1.5px solid var(--border);color:var(--text2);padding:10px 28px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.load-more button:hover{border-color:var(--primary);color:var(--primary)}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#1A1A2E;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:9999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
@media (max-width:600px){
  .content{padding:12px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stat-value{font-size:22px}
  header{padding:0 12px;gap:6px}
  .auto-toggle{display:none}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🤝</div>
      <span class="auth-logo-text">Trao Tay</span>
    </div>
    <p class="auth-tagline">"Đồ cũ người này, Báu vật người kia"</p>
    <h2>Đăng nhập quản trị</h2>
    <p>Dành cho tài khoản admin</p>

    <div id="step-email">
      <div class="form-group">
        <label>EMAIL</label>
        <input id="email-input" type="email" placeholder="admin@example.com" autocomplete="email"/>
      </div>
      <div class="err" id="email-err"></div>
      <button class="btn btn-primary" id="send-otp-btn">Gửi mã OTP</button>
    </div>

    <div id="step-otp" style="display:none">
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Nhập mã OTP đã gửi đến <strong id="otp-email-display"></strong></p>
      <div class="otp-row" id="otp-row"></div>
      <div class="err" id="otp-err"></div>
      <button class="btn btn-primary" id="verify-otp-btn">Xác nhận</button>
      <div style="text-align:center;margin-top:10px;display:flex;flex-direction:column;gap:4px">
        <button class="btn btn-link" id="resend-otp-btn" disabled>Gửi lại sau 60s</button>
        <button class="btn btn-link" id="back-email-btn">← Đổi email</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="logo"><div class="logo-icon">🤝</div>Trao Tay Admin</div>
    <div class="spacer"></div>
    <label class="auto-toggle" title="Tự cập nhật mỗi 30s khi đang ở tab Tổng quan">
      <input type="checkbox" id="auto-refresh-toggle"/> Tự cập nhật
    </label>
    <button class="btn-refresh" id="refresh-btn" title="Làm mới tab hiện tại">🔄</button>
    <span class="user-info" id="header-user"></span>
    <button class="btn-logout" id="logout-btn">Đăng xuất</button>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="0">📊 Tổng quan</button>
    <button class="tab" data-tab="1">📦 Bài đăng</button>
    <button class="tab" data-tab="2">👤 Người dùng</button>
    <button class="tab" data-tab="3">🚩 Báo cáo</button>
    <button class="tab" data-tab="4">💰 Doanh thu</button>
    <button class="tab" data-tab="5">📜 Lịch sử admin</button>
    <button class="tab" data-tab="6">⚙️ Hệ thống</button>
    <button class="tab" data-tab="7">📢 Broadcast</button>
    <button class="tab" data-tab="8">⭐ Đánh giá</button>
    <button class="tab" data-tab="9">💬 Chat</button>
    <button class="tab" data-tab="10">🏷️ Danh mục</button>
  </div>

  <div class="content">
    <div id="tab-stats"></div>
    <div id="tab-posts" style="display:none"></div>
    <div id="tab-users" style="display:none"></div>
    <div id="tab-reports" style="display:none"></div>
    <div id="tab-revenue" style="display:none"></div>
    <div id="tab-audit" style="display:none"></div>
    <div id="tab-system" style="display:none"></div>
    <div id="tab-broadcast" style="display:none"></div>
    <div id="tab-reviews" style="display:none"></div>
    <div id="tab-chats" style="display:none"></div>
    <div id="tab-categories" style="display:none"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = '';
let token = localStorage.getItem('admin_token') || '';
let currentTab = 0;
let autoRefreshTimer = null;
let resendTimer = null;
let resendSecondsLeft = 0;

const TAB_IDS = ['stats','posts','users','reports','revenue','audit','system','broadcast','reviews','chats','categories'];

const state = {
  posts: [], postsPage: 0, postsTotal: 0, postsTotalPages: 1, postsSearch: '', postsStatus: '', postsAuthorId: '', postsAuthorName: '',
  users: [], usersPage: 0, usersTotal: 0, usersTotalPages: 1, usersSearch: '', usersRole: '', usersBanned: '', usersSelected: new Set(),
  reports: [], reportsPage: 0, reportsTotal: 0, reportsTotalPages: 1, reportsStatus: '',
  orders: [], ordersPage: 0, ordersTotal: 0, ordersTotalPages: 1,
  revenueData: null, timeline: null, timelineFrom: '', timelineTo: '',
  audit: [], auditPage: 0, auditTotal: 0, auditTotalPages: 1, auditTargetType: '',
  topData: null,
  broadcastSegment: 'all', broadcastPreview: null, broadcastHistory: [],
  reviews: [], reviewsPage: 0, reviewsTotal: 0, reviewsTotalPages: 1, reviewsRating: '', reviewsSearch: '',
  chats: [], chatsPage: 0, chatsTotal: 0, chatsTotalPages: 1, chatsSearch: '', chatsUserId: '', chatsUserName: '', currentChatRoom: null, currentChatMessages: [],
  categories: [],
};

// ─── Boot ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Auth screen
  on('send-otp-btn', 'click', sendOtp);
  on('verify-otp-btn', 'click', verifyOtp);
  on('back-email-btn', 'click', backToEmail);
  on('resend-otp-btn', 'click', resendOtp);
  on('email-input', 'keydown', e => { if(e.key==='Enter') sendOtp(); });

  // App
  on('refresh-btn', 'click', refreshCurrent);
  on('logout-btn', 'click', logout);
  on('auto-refresh-toggle', 'change', toggleAutoRefresh);
  on('modal-close', 'click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Tabs
  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('[data-tab]');
    if (tab) switchTab(+tab.dataset.tab);
  });

  // Delegated content actions (data-action)
  document.querySelector('.content').addEventListener('click', handleContentClick);
  document.querySelector('.content').addEventListener('keydown', handleContentKeydown);
  document.querySelector('.content').addEventListener('change', handleContentChange);

  // Modal action delegation — bind cả body lẫn actions (button có thể nằm trong cả 2)
  document.getElementById('modal-actions').addEventListener('click', handleModalAction);
  document.getElementById('modal-body').addEventListener('click', handleModalAction);

  if (token) initApp();
});

function on(id, ev, fn) { document.getElementById(id).addEventListener(ev, fn); }

// ─── Auth ─────────────────────────────────────────────────────────────────────

async function sendOtp() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  if (!email || !email.includes('@')) { showErr('email-err', 'Vui lòng nhập email hợp lệ'); return; }
  showErr('email-err', '');
  const btn = document.getElementById('send-otp-btn');
  btn.disabled = true; btn.textContent = 'Đang gửi...';
  try {
    const res = await fetch(`${BASE}/user/admin-login/send`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email}),
    });
    const data = await res.json();
    if (!res.ok) { showErr('email-err', data.message || 'Email này không có quyền truy cập'); btn.disabled=false; btn.textContent='Gửi mã OTP'; return; }
    document.getElementById('otp-email-display').textContent = email;
    document.getElementById('step-email').style.display = 'none';
    document.getElementById('step-otp').style.display = 'block';
    buildOtpBoxes();
    startResendCountdown(60);
  } catch(e) {
    showErr('email-err', 'Không kết nối được server');
    btn.disabled = false; btn.textContent = 'Gửi mã OTP';
  }
}

async function resendOtp() {
  const btn = document.getElementById('resend-otp-btn');
  if (btn.disabled) return;
  // reset OTP boxes + send again
  buildOtpBoxes();
  document.getElementById('send-otp-btn').disabled = false;
  document.getElementById('send-otp-btn').textContent = 'Gửi mã OTP';
  await sendOtp();
}

function startResendCountdown(seconds) {
  resendSecondsLeft = seconds;
  const btn = document.getElementById('resend-otp-btn');
  btn.disabled = true;
  if (resendTimer) clearInterval(resendTimer);
  const tick = () => {
    if (resendSecondsLeft <= 0) {
      btn.disabled = false;
      btn.textContent = 'Gửi lại mã';
      clearInterval(resendTimer); resendTimer = null;
      return;
    }
    btn.textContent = `Gửi lại sau ${resendSecondsLeft}s`;
    resendSecondsLeft--;
  };
  tick();
  resendTimer = setInterval(tick, 1000);
}

function buildOtpBoxes() {
  const row = document.getElementById('otp-row');
  row.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const inp = document.createElement('input');
    inp.type = 'tel'; inp.maxLength = 1; inp.id = `otp-${i}`; inp.inputMode = 'numeric';
    inp.addEventListener('input', e => {
      if (e.target.value.length === 1 && i < 5) document.getElementById(`otp-${i+1}`).focus();
      if (e.target.value.length === 1 && i === 5) verifyOtp();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) {
        const prev = document.getElementById(`otp-${i-1}`);
        prev.focus(); prev.value = '';
      }
    });
    row.appendChild(inp);
  }
  document.getElementById('otp-0').focus();
}

async function verifyOtp() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  let code = '';
  for (let i = 0; i < 6; i++) code += document.getElementById(`otp-${i}`)?.value || '';
  if (code.length !== 6) { showErr('otp-err', 'Nhập đủ 6 chữ số'); return; }
  showErr('otp-err', '');
  const btn = document.getElementById('verify-otp-btn');
  btn.disabled = true; btn.textContent = 'Đang xác nhận...';
  try {
    const res = await fetch(`${BASE}/user/email-login/verify`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, otp: code}),
    });
    const data = await res.json();
    if (!res.ok) { showErr('otp-err', data.message || 'OTP không đúng'); btn.disabled=false; btn.textContent='Xác nhận'; return; }
    if (data.user?.role !== 'admin') {
      showErr('otp-err', 'Tài khoản này không có quyền admin');
      btn.disabled = false; btn.textContent = 'Xác nhận';
      return;
    }
    token = data.accessToken;
    localStorage.setItem('admin_token', token);
    localStorage.setItem('admin_name', data.user?.name || email);
    localStorage.setItem('admin_id', data.user?.id || '');
    initApp();
  } catch(e) {
    showErr('otp-err', 'Lỗi xác nhận');
    btn.disabled = false; btn.textContent = 'Xác nhận';
  }
}

function backToEmail() {
  if (resendTimer) { clearInterval(resendTimer); resendTimer = null; }
  document.getElementById('step-otp').style.display = 'none';
  document.getElementById('step-email').style.display = 'block';
  document.getElementById('send-otp-btn').disabled = false;
  document.getElementById('send-otp-btn').textContent = 'Gửi mã OTP';
}

function logout() {
  token = ''; localStorage.removeItem('admin_token'); localStorage.removeItem('admin_name'); localStorage.removeItem('admin_id');
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  backToEmail();
}

// ─── App init ─────────────────────────────────────────────────────────────────

function initApp() {
  // Backfill admin_id từ JWT cho session cũ (login trước khi Phase 6 lưu admin_id).
  // Self-protection UI cần admin_id để compare với u.id.
  if (!localStorage.getItem('admin_id') && token) {
    try {
      const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      if (payload?.sub) localStorage.setItem('admin_id', payload.sub);
    } catch {}
  }
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('header-user').textContent = localStorage.getItem('admin_name') || '';
  switchTab(0);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === tab));
  TAB_IDS.forEach((id, i) => {
    document.getElementById(`tab-${id}`).style.display = i === tab ? 'block' : 'none';
  });
  // Cancel auto-refresh khi rời tab Tổng quan
  if (tab !== 0 && autoRefreshTimer) {
    clearInterval(autoRefreshTimer); autoRefreshTimer = null;
    document.getElementById('auto-refresh-toggle').checked = false;
  }
  loadCurrent();
}

function loadCurrent(force = false) {
  switch (currentTab) {
    case 0: loadStats(); break;
    case 1: if (force || state.posts.length === 0) loadPosts(true); break;
    case 2: if (force || state.users.length === 0) loadUsers(true); break;
    case 3: if (force || state.reports.length === 0) loadReports(true); break;
    case 4: if (force || !state.revenueData) loadRevenue(true); break;
    case 5: if (force || state.audit.length === 0) loadAudit(true); break;
    case 6: loadSystem(); break;
    case 7: loadBroadcast(); break;
    case 8: if (force || state.reviews.length === 0) loadReviews(true); break;
    case 9: if (force || state.chats.length === 0) loadChats(true); break;
    case 10: if (force || state.categories.length === 0) loadCategories(); break;
  }
}

function refreshCurrent() {
  loadCurrent(true);
  toast('Đã làm mới');
}

function toggleAutoRefresh(e) {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  if (e.target.checked && currentTab === 0) {
    autoRefreshTimer = setInterval(() => loadStats(), 30000);
    toast('Tự cập nhật bật — mỗi 30 giây');
  }
}

// ─── API helper ───────────────────────────────────────────────────────────────

async function api(path, opts = {}) {
  try {
    const ctrl = new AbortController();
    const timeoutId = setTimeout(() => ctrl.abort(), 15000);
    const res = await fetch(`${BASE}${path}`, {
      ...opts,
      signal: ctrl.signal,
      headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{})},
    });
    clearTimeout(timeoutId);
    if (res.status === 401 || res.status === 403) { logout(); return null; }
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const j = await res.json(); if (j.message) msg = j.message; } catch {}
      toast('Lỗi: ' + msg);
      return null;
    }
    return res.json();
  } catch (e) {
    toast(e.name === 'AbortError' ? 'Request timeout' : 'Network error');
    return null;
  }
}

// ─── Content event delegation ─────────────────────────────────────────────────

function handleContentClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  // Tránh scroll-to-top khi click <a href="#"> trong audit log links
  if (el.tagName === 'A') e.preventDefault();
  const a = el.dataset.action;
  const id = el.dataset.id;
  const idx = el.dataset.idx ? +el.dataset.idx : null;
  const extra = el.dataset.extra;

  switch (a) {
    case 'open-post': openPostDetail(id); break;
    case 'open-user': openUserDetail(id); break;
    case 'open-report': openReportDetail(id); break;
    case 'view-post-from-modal': closeModal(); openPostDetail(id); break;

    case 'hide-post': e.stopPropagation(); hidePost(id, idx); break;
    case 'unhide-post': e.stopPropagation(); unhidePost(id, idx); break;
    case 'delete-post': e.stopPropagation(); deletePost(id, idx, extra); break;
    case 'restore-post': e.stopPropagation(); restorePost(id, idx); break;

    case 'resolve-report': resolveReport(id, idx, 'resolved'); break;
    case 'dismiss-report': resolveReport(id, idx, 'dismissed'); break;

    case 'switch-tab': switchTab(+el.dataset.target); break;

    case 'load-more': {
      const target = el.dataset.target;
      if (target === 'posts') loadPosts();
      else if (target === 'users') loadUsers();
      else if (target === 'reports') loadReports();
      else if (target === 'revenue') loadRevenue();
      else if (target === 'audit') loadAudit();
      else if (target === 'reviews') loadReviews();
      else if (target === 'chats') loadChats();
      break;
    }

    case 'set-posts-status':
      state.postsStatus = el.dataset.value || '';
      loadPosts(true);
      break;
    case 'set-users-role':
      state.usersRole = el.dataset.value || '';
      loadUsers(true);
      break;
    case 'set-users-banned':
      state.usersBanned = el.dataset.value || '';
      loadUsers(true);
      break;
    case 'set-reports-status':
      state.reportsStatus = el.dataset.value || '';
      loadReports(true);
      break;
    case 'set-audit-target':
      state.auditTargetType = el.dataset.value || '';
      loadAudit(true);
      break;

    case 'do-search-posts': {
      state.postsSearch = document.getElementById('posts-search').value;
      loadPosts(true); break;
    }
    case 'do-search-users': {
      state.usersSearch = document.getElementById('users-search').value;
      loadUsers(true); break;
    }

    case 'set-range-quick': {
      const days = +el.dataset.value;
      const today = new Date();
      const from = new Date(); from.setDate(today.getDate() - days + 1);
      state.timelineFrom = from.toISOString().slice(0, 10);
      state.timelineTo = today.toISOString().slice(0, 10);
      reloadTimeline();
      break;
    }
    case 'apply-range': {
      const f = document.getElementById('range-from')?.value;
      const t = document.getElementById('range-to')?.value;
      if (!f || !t) { toast('Chọn cả 2 ngày'); break; }
      state.timelineFrom = f; state.timelineTo = t;
      reloadTimeline();
      break;
    }
    case 'export-csv-server': exportCsvServer(); break;

    case 'set-broadcast-segment':
      state.broadcastSegment = el.dataset.value || 'all';
      previewBroadcastSegment();
      break;
    case 'do-broadcast': doBroadcast(); break;

    case 'set-reviews-rating':
      state.reviewsRating = el.dataset.value || '';
      loadReviews(true); break;
    case 'do-search-reviews':
      state.reviewsSearch = document.getElementById('reviews-search').value;
      loadReviews(true); break;
    case 'open-review': openReviewDetail(id); break;
    case 'delete-review': e.stopPropagation(); deleteReviewPrompt(id, idx); break;

    case 'do-search-chats':
      state.chatsSearch = document.getElementById('chats-search').value;
      loadChats(true); break;
    case 'open-chat-room': openChatRoom(id); break;
    case 'delete-message': deleteMessagePrompt(id); break;

    case 'refund-order': refundOrderPrompt(id, +extra); break;

    case 'create-category': createCategoryPrompt(); break;
    case 'edit-category': editCategoryPrompt(id); break;
    case 'toggle-category': toggleCategoryEnabled(id); break;
    case 'delete-category': deleteCategoryConfirm(id, extra); break;

    case 'clear-posts-author':
      state.postsAuthorId = ''; state.postsAuthorName = '';
      loadPosts(true);
      break;
    case 'clear-chats-user':
      state.chatsUserId = ''; state.chatsUserName = '';
      loadChats(true);
      break;

    case 'toggle-user-select':
      if (state.usersSelected.has(id)) state.usersSelected.delete(id);
      else state.usersSelected.add(id);
      renderUsers(false);
      break;
    case 'clear-users-selection':
      state.usersSelected.clear();
      renderUsers(false);
      break;
    case 'bulk-ban-users': bulkBanSelected(); break;
  }
}

function handleContentKeydown(e) {
  if (e.key !== 'Enter') return;
  if (e.target.id === 'posts-search') { state.postsSearch = e.target.value; loadPosts(true); }
  else if (e.target.id === 'users-search') { state.usersSearch = e.target.value; loadUsers(true); }
  else if (e.target.id === 'reviews-search') { state.reviewsSearch = e.target.value; loadReviews(true); }
  else if (e.target.id === 'chats-search') { state.chatsSearch = e.target.value; loadChats(true); }

function handleContentChange(e) {
  // (range pickers use button to apply; not auto-trigger)
}

function handleModalAction(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action;
  const id = el.dataset.id;
  const extra = el.dataset.extra;
  switch (a) {
    case 'modal-hide-post': modalHidePost(id); break;

    case 'modal-delete-post': modalDeletePost(id, extra); break;

    case 'modal-view-post': closeModal(); openPostDetail(id); break;

      closeModal();
      switchTab(9);
      break;
    case 'delete-review': deleteReviewPrompt(id); break;
    case 'delete-message': deleteMessagePrompt(id); break;
  }
}

// ─── Posts ────────────────────────────────────────────────────────────────────

async function loadPosts(reset = false) {
  if (reset) { state.posts = []; state.postsPage = 0; state.postsTotalPages = 1; state.postsTotal = 0; }
  renderPosts(true);
  const page = state.postsPage + 1;
  const params = new URLSearchParams({page, limit:20});
  if (state.postsSearch) params.set('search', state.postsSearch);
  if (state.postsStatus) params.set('status', state.postsStatus);
  if (state.postsAuthorId) params.set('authorId', state.postsAuthorId);
  const data = await api(`/admin/posts?${params}`);
  if (!data) return;
  state.posts.push(...(data.data||[]));
  state.postsPage = data.meta?.page || page;
  state.postsTotalPages = data.meta?.totalPages || 1;
  state.postsTotal = data.meta?.total || 0;
  renderPosts(false);
}

async function loadUsers(reset = false) {
  if (reset) { state.users = []; state.usersPage = 0; state.usersTotalPages = 1; state.usersTotal = 0; }
  renderUsers(true);
  const page = state.usersPage + 1;
  const params = new URLSearchParams({page, limit:20});
  if (state.usersSearch) params.set('search', state.usersSearch);
  if (state.usersRole) params.set('role', state.usersRole);
  if (state.usersBanned) params.set('banned', state.usersBanned);
  const data = await api(`/admin/users?${params}`);
  if (!data) return;
  state.users.push(...(data.data||[]));
  state.usersPage = data.meta?.page || page;
  state.usersTotalPages = data.meta?.totalPages || 1;
  state.usersTotal = data.meta?.total || 0;
  renderUsers(false);
}

function renderUsers(loading) {
  const el = document.getElementById('tab-users');
  const roleChips = [['','Tất cả'],['admin','Admin'],['user','User thường']]
    .map(([k,l]) => `<button class="fchip ${state.usersRole===k?'active':''}" data-action="set-users-role" data-value="${k}">${l}</button>`).join('');
  const banChips = [['','Tất cả trạng thái'],['true','Bị khóa'],['false','Hoạt động']]
    .map(([k,l]) => `<button class="fchip ${state.usersBanned===k?'active':''}" data-action="set-users-banned" data-value="${k}">${l}</button>`).join('');
  const selectedCount = state.usersSelected.size;
  const bulkBar = selectedCount > 0
    ? `<div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
         <span>☑️ Đã chọn <strong>${selectedCount}</strong> user</span>
         <button class="btn-sm btn-red" data-action="bulk-ban-users">🔒 Khóa ${selectedCount} user</button>
         <button class="btn-sm btn-grey" data-action="clear-users-selection">Bỏ chọn</button>
       </div>` : '';
  const searchHtml = `${bulkBar}<div class="toolbar">
    <input id="users-search" type="text" placeholder="🔍 Tìm theo tên/email/SĐT..." value="${esc(state.usersSearch)}"/>
    <button class="btn-sm btn-green" data-action="do-search-users">Tìm</button>
  </div>
  <div class="filter-chips">${roleChips}</div>
  <div class="filter-chips">${banChips}</div>`;

  if (loading && state.users.length === 0) {
    el.innerHTML = searchHtml + '<div class="loading"><div class="spinner"></div> Đang tải...</div>';
    return;
  }
  if (!loading && state.users.length === 0) {
    el.innerHTML = searchHtml + '<div class="empty"><div class="empty-icon">👤</div><p>Không có người dùng nào khớp</p></div>';
    return;
  }
  const adminId = localStorage.getItem('admin_id') || '';
  const items = state.users.map(u => {
    const banned = u.isBanned === true;
    const cnt = u._count || {};
    const initials = (u.name || 'U')[0].toUpperCase();
    const avatarColor = avatarBg(u.name || 'U');
    const isSelf = u.id === adminId;
    const isSelected = state.usersSelected.has(u.id);
    const checkbox = isSelf
      ? `<div style="width:18px;flex-shrink:0" title="Đây là tài khoản của bạn"></div>`
      : `<input type="checkbox" data-action="toggle-user-select" data-id="${esc(u.id)}" ${isSelected?'checked':''} style="width:18px;height:18px;flex-shrink:0;cursor:pointer"/>`;
    return `<div class="item-card" data-action="open-user" data-id="${esc(u.id)}">
      <div class="user-row">
        ${checkbox}
        <div class="avatar" style="background:${avatarColor}">${u.avatar?`<img src="${esc(u.avatar)}"/>`:initials}</div>
        <div class="user-info-col">
          <div class="name">${esc(u.name||'Không tên')}
            ${u.role==='admin'?'<span class="chip chip-blue">Admin</span>':''}
            ${banned?'<span class="chip chip-red">Bị khóa</span>':''}
            ${u.deletedAt?'<span class="chip chip-grey">Đã xóa TK</span>':''}
            ${isSelf?'<span class="chip chip-purple">Bạn</span>':''}
            ${(u.pendingReportsOnPosts||0) > 3 ? `<span class="chip chip-red" title="Bài của user này đang bị nhiều người báo cáo">🚩 ${u.pendingReportsOnPosts} báo cáo</span>` : ''}
          </div>
          <div class="sub">${esc(u.email||u.phone||'—')} · ${cnt.posts||0} bài · ${cnt.dealsAsRequester||0} deal</div>
        </div>
      </div>
    </div>`;
  }).join('');
  const pagination = paginationInfo('users', state.usersPage, state.usersTotalPages, state.usersTotal, state.users.length);
  const loadMore = state.usersPage < state.usersTotalPages
    ? `<div class="load-more"><button data-action="load-more" data-target="users">${loading?'Đang tải...':'Tải thêm'}</button></div>` : '';
  el.innerHTML = searchHtml + pagination + items + loadMore;
}

async function modalBanUser(id, ban) {
  let reason = '';
  if (ban) {
    const r = prompt('Khóa tài khoản này?\nUser sẽ không login + email/SĐT bị blacklist.\n\nNhập lý do khóa (ghi vào audit log):');
    if (r === null) return;
    reason = r;
  } else {
    if (!confirm('Mở khóa tài khoản này?')) return;
  }
  await api(`/admin/users/${id}/ban`, {method:'PATCH', body: JSON.stringify({isBanned:ban, reason})});
  closeModal(); loadUsers(true); toast(ban ? 'Đã khóa tài khoản' : 'Đã mở khóa');
}

async function bulkBanSelected() {
  const ids = Array.from(state.usersSelected);
  if (ids.length === 0) return;
  if (ids.length > 50) { toast('Tối đa 50 user/lần'); return; }
  const reason = prompt(`Khóa ${ids.length} user đã chọn?\nMỗi user sẽ bị blacklist email/phone (không re-register).\n\nNhập lý do (ghi audit log từng user):`);
  if (reason === null) return;
  if (!reason.trim()) { toast('Phải nhập lý do'); return; }
  if (!confirm(`Xác nhận khóa ${ids.length} user? Hành động không thể hoàn tác bằng 1 lệnh — phải mở khóa từng user.`)) return;

  toast(`Đang khóa ${ids.length} user...`);
  const res = await api('/admin/users/bulk-ban', {
    method: 'POST',
    body: JSON.stringify({ ids, reason: reason.trim() }),
  });
  if (!res) return;
  let msg = `Đã khóa ${res.success}/${ids.length}`;
  if (res.skippedSelf) msg += ` · bỏ qua tài khoản của bạn`;
  if (res.failed) msg += ` · ${res.failed} thất bại`;
  toast(msg);
  state.usersSelected.clear();
  loadUsers(true);
}

async function modalSetRole(id, role) {
  const msg = role === 'admin' ? 'Cấp quyền Admin? User sẽ truy cập được trang quản trị này.' : 'Hạ quyền Admin?';
  if (!confirm(msg)) return;
  await api(`/admin/users/${id}/role`, {method:'PATCH', body: JSON.stringify({role})});
  closeModal(); loadUsers(true); toast(role==='admin'?'Đã cấp quyền Admin':'Đã hạ quyền');
}

async function loadReports(reset = false) {
  if (reset) { state.reports = []; state.reportsPage = 0; state.reportsTotalPages = 1; state.reportsTotal = 0; }
  renderReports(true);
  const page = state.reportsPage + 1;
  const params = new URLSearchParams({page, limit:20});
  if (state.reportsStatus) params.set('status', state.reportsStatus);
  const data = await api(`/admin/reports?${params}`);
  if (!data) return;
  state.reports.push(...(data.data||[]));
  state.reportsPage = data.meta?.page || page;
  state.reportsTotalPages = data.meta?.totalPages || 1;
  state.reportsTotal = data.meta?.total || 0;
  renderReports(false);
}

function renderReports(loading) {
  const el = document.getElementById('tab-reports');
  const filterChips = `
    <div class="filter-chips">
      ${[['',`Tất cả`],['pending','Chờ xử lý'],['resolved','Đã xử lý'],['dismissed','Đã bỏ qua']].map(([k,l]) => `
        <button class="fchip ${state.reportsStatus===k?'active':''}" data-action="set-reports-status" data-value="${k}">${l}</button>
      `).join('')}
    </div>`;
  if (loading && state.reports.length === 0) {
    el.innerHTML = filterChips + '<div class="loading"><div class="spinner"></div> Đang tải...</div>';
    return;
  }
  if (!loading && state.reports.length === 0) {
    el.innerHTML = filterChips + '<div class="empty"><div class="empty-icon">🚩</div><p>Không có báo cáo nào</p></div>';
    return;
  }
  const items = state.reports.map((r, i) => {

    return `<div class="item-card" style="${isPending?'border-color:#FCD34D':''}" data-action="open-report" data-id="${esc(r.id)}">

        ${chipStatus(r.status)}

        <button class="btn-sm btn-orange" data-action="resolve-report" data-id="${esc(r.id)}" data-idx="${i}">Ẩn bài & xử lý</button>

      </div>`:''}

  el.innerHTML = filterChips + pagination + items + loadMore;
}

async function resolveReport(id, idx, action) {
  if (action === 'resolved' && !confirm('Xử lý báo cáo này? Bài sẽ bị ẩn.')) return;
  await api(`/admin/reports/${id}`, {method:'PATCH', body: JSON.stringify({action})});
  if (state.reports[idx]) state.reports[idx].status = action;
  renderReports(false);
  toast(action === 'resolved' ? 'Đã xử lý & ẩn bài' : 'Đã bỏ qua báo cáo');

async function loadRevenue(reset = false) {
  if (reset) {
    state.orders = []; state.ordersPage = 0; state.ordersTotalPages = 1; state.ordersTotal = 0;
    state.revenueData = null; state.timeline = null;
  }
  const el = document.getElementById('tab-revenue');
  if (state.orders.length === 0 && !state.revenueData) {
    el.innerHTML = '<div class="loading"><div class="spinner"></div> Đang tải...</div>';
  }
  const tlParams = new URLSearchParams();
  if (state.timelineFrom && state.timelineTo) {
    tlParams.set('from', state.timelineFrom);
    tlParams.set('to', state.timelineTo);
  } else {
    tlParams.set('days', '30');
  }

  const [rev, ord, tl] = await Promise.all([
    state.revenueData ? Promise.resolve(state.revenueData) : api('/admin/revenue'),
    api(`/admin/bump-orders?page=${state.ordersPage+1}&limit=20`),
    api(`/admin/revenue/timeline?${tlParams}`),
  ]);
  if (rev) state.revenueData = rev;
  if (tl) state.timeline = tl;
  if (ord) {
    state.orders.push(...(ord.data||[]));
    state.ordersPage = ord.meta?.page || 1;
    state.ordersTotalPages = ord.meta?.totalPages || 1;
    state.ordersTotal = ord.meta?.total || 0;
  }
  renderRevenue();
}

async function reloadTimeline() {

  } else {
    tlParams.set('days', '30');

function renderTimelineChart(data) {
  if (!data || data.length === 0) return '<div style="text-align:center;color:var(--text2);padding:30px">Chưa có dữ liệu</div>';
  const max = Math.max(...data.map(d => d.amount), 1);
  const w = 100, h = 100;
  const barW = w / data.length;
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line class="chart-axis" x1="0" y1="${h}" x2="${w}" y2="${h}"/>
    ${data.map((d, i) => {
      const bh = (d.amount/max) * (h-4);
      const x = i*barW;
      return `<rect class="chart-bar" x="${x+0.3}" y="${h-bh}" width="${barW-0.6}" height="${bh}"><title>${d.date}: ${fmoneyFull(d.amount)}</title></rect>`;
    }).join('')}
  </svg>
  <div style="display:flex;justify-content:space-between;color:var(--text3);font-size:11px;margin-top:6px">
    <span>${data[0]?.date||''}</span>
    <span>Cao nhất: ${fmoneyFull(max)}</span>
    <span>${data[data.length-1]?.date||''}</span>
  </div>`;
}

/// Server-side CSV export — tải hết orders trong phạm vi đã filter.
function exportCsvServer() {
  const params = new URLSearchParams();
  if (state.timelineFrom) params.set('from', state.timelineFrom);
  if (state.timelineTo) params.set('to', state.timelineTo);
  const url = `/admin/bump-orders/export?${params}`;
  // dùng fetch để gắn Authorization header, sau đó tạo blob download
  toast('Đang chuẩn bị CSV...');
  fetch(url, {headers: {'Authorization':`Bearer ${token}`}})
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.blob();
    })
    .then(blob => {
      const dlUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date().toISOString().slice(0, 10);
      a.href = dlUrl; a.download = `traotay-orders-${ts}.csv`;
      a.click();
      URL.revokeObjectURL(dlUrl);
      toast('Đã tải CSV');
    })
    .catch(e => toast('Lỗi xuất CSV: ' + e.message));
}

async function loadAudit(reset = false) {
  if (reset) { state.audit = []; state.auditPage = 0; state.auditTotalPages = 1; state.auditTotal = 0; }
  renderAudit(true);
  const params = new URLSearchParams({page: state.auditPage+1, limit:50});
  if (state.auditTargetType) params.set('targetType', state.auditTargetType);
  const data = await api(`/admin/audit?${params}`);
  if (!data) return;
  state.audit.push(...(data.data||[]));
  state.auditPage = data.meta?.page || (state.auditPage+1);
  state.auditTotalPages = data.meta?.totalPages || 1;
  state.auditTotal = data.meta?.total || 0;
  renderAudit(false);
}

function renderAudit(loading) {
  const el = document.getElementById('tab-audit');
  const filterChips = `
    <div class="filter-chips">
      ${[['','Tất cả'],['post','Bài đăng'],['user','Người dùng'],['report','Báo cáo']].map(([k,l]) => `
        <button class="fchip ${state.auditTargetType===k?'active':''}" data-action="set-audit-target" data-value="${k}">${l}</button>
      `).join('')}
    </div>`;
  if (loading && state.audit.length === 0) {
    el.innerHTML = filterChips + '<div class="loading"><div class="spinner"></div> Đang tải...</div>';
    return;
  }
  if (!loading && state.audit.length === 0) {
    el.innerHTML = filterChips + '<div class="empty"><div class="empty-icon">📜</div><p>Chưa có hành động admin nào</p></div>';
    return;
  }
  const items = state.audit.map(h => {
    const meta = h.metadata || {};
    let summary = '';
    if (h.action === 'user.role') summary = ` ${esc(meta.previousRole||'?')} → ${esc(meta.newRole||'?')}`;
    else if (h.action === 'post.delete') summary = ` "${esc(meta.title||h.targetId)}"${meta.reason?` — ${esc(meta.reason)}`:''}`;
    else if (meta.reason) summary = ` — ${esc(meta.reason)}`;
    const link = h.targetType === 'user'
      ? `<a href="#" data-action="open-user" data-id="${esc(h.targetId)}" style="color:var(--info)">${esc(h.targetId.slice(0,8))}…</a>`
      : h.targetType === 'post'
        ? `<a href="#" data-action="open-post" data-id="${esc(h.targetId)}" style="color:var(--info)">${esc(h.targetId.slice(0,8))}…</a>`
        : esc(h.targetId.slice(0, 12));
    return `<div class="audit-row">
      <span class="audit-action ${actionTone(h.action)}">${esc(h.action)}</span>
      <b>${esc(h.admin?.name||h.admin?.email||'—')}</b>
      → ${esc(h.targetType)} ${link}${summary}
      <div class="meta">${fmtDate(h.createdAt)}</div>
    </div>`;
  }).join('');
  const pagination = paginationInfo('audit', state.auditPage, state.auditTotalPages, state.auditTotal, state.audit.length);
  const loadMore = state.auditPage < state.auditTotalPages
    ? `<div class="load-more"><button data-action="load-more" data-target="audit">${loading?'Đang tải...':'Tải thêm'}</button></div>` : '';
  el.innerHTML = filterChips + pagination + items + loadMore;
}

function actionTone(action) {
  if (action.includes('delete') || action.includes('ban')) return 'danger';
  if (action.includes('hide') || action.includes('resolve')) return 'warn';
  return '';
}

async function refundOrderPrompt(orderId, amount) {

  const res = await api(`/admin/bump-orders/${orderId}/refund`, {
    method: 'POST',

  if (!res) return;
  toast(`Đã đánh dấu hoàn ${res.refundedAmount.toLocaleString('vi-VN')}đ`);

async function previewBroadcastSegment() {
  const seg = state.broadcastSegment;
  const res = await api(`/admin/notification/segment-preview?segment=${seg}`);
  if (!res) return;
  state.broadcastPreview = res;
  const el = document.getElementById('broadcast-preview');
  if (el) {
    el.innerHTML = `→ Sẽ gửi tới <strong>${res.total}</strong> user (${res.withFcm} có FCM token, sẽ nhận push notification)`;
  }
}

async function doBroadcast() {
  const title = document.getElementById('broadcast-title').value.trim();
  const body = document.getElementById('broadcast-body').value.trim();
  if (!title || title.length > 100) { toast('Tiêu đề 1-100 ký tự'); return; }
  if (!body || body.length > 500) { toast('Nội dung 1-500 ký tự'); return; }
  const segLabel = state.broadcastPreview?.total ?? '?';
  if (!confirm(`Gửi broadcast tới ${segLabel} user?\n\nTiêu đề: ${title}\nNội dung: ${body}\n\nKhông thể hoàn tác.`)) return;

  toast('Đang gửi broadcast...');
  const res = await api('/admin/notification/broadcast', {
    method: 'POST',
    body: JSON.stringify({ segment: state.broadcastSegment, title, body }),
  });
  if (!res) return;
  toast(`Đã gửi: ${res.sent}/${res.totalUsers} ✓ · ${res.failed} thất bại`);
  document.getElementById('broadcast-title').value = '';
  document.getElementById('broadcast-body').value = '';
  state.broadcastHistory = [];
  loadBroadcast();
}

    </div>`).join('');
  el.innerHTML = `

    <div class="section-title">Tiến trình backend</div>
    <div class="bar-card">
      <div class="kv"><span class="k">Uptime</span><span class="v">${formatUptime(proc.uptime||0)}</span></div>
      <div class="kv"><span class="k">Memory RSS</span><span class="v">${proc.memory?.rss||0} MB</span></div>
      <div class="kv"><span class="k">Heap dùng / tổng</span><span class="v">${proc.memory?.heapUsed||0} / ${proc.memory?.heapTotal||0} MB</span></div>
      <div class="kv"><span class="k">Node.js</span><span class="v">${esc(proc.nodeVersion||'—')}</span></div>
      <div class="kv"><span class="k">Môi trường</span><span class="v">${esc(proc.env||'—')}</span></div>
    </div>
  `;
}

function formatUptime(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  if (s < 86400) return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
  return Math.floor(s/86400) + 'd ' + Math.floor((s%86400)/3600) + 'h';
}

// ─── Modal ────────────────────────────────────────────────────────────────────

function showModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-actions').innerHTML = actions;
  document.getElementById('modal').classList.add('show');
  document.body.classList.add('modal-open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.classList.remove('modal-open');
}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function paginationInfo(scope, page, totalPages, total, loaded) {
  if (total === 0) return '';
  return `<div class="pagination-info">
    <span>Trang <strong>${page}</strong>/${totalPages} · <strong>${loaded}</strong>/${total} đã tải</span>
    <span>${scope}</span>
  </div>`;
}

function chipStatus(s) {
  const map = {
    available:['Hiển thị','chip-green'],
    hidden:['Ẩn','chip-grey'],
    done:['Xong','chip-blue'],
    reserved:['Đang giữ','chip-orange'],
    pending:['Chờ xử lý','chip-orange'],
    resolved:['Đã xử lý','chip-green'],
    dismissed:['Bỏ qua','chip-grey'],
    deleted_by_admin:['Đã xóa bởi admin','chip-red'],
  };
  const [l, c] = map[s] || [s, 'chip-grey'];
  return `<span class="chip ${c}" style="flex-shrink:0">${esc(l)}</span>`;
}
function statusLabel(s) {
  const map = {
    available:'Hiển thị', hidden:'Ẩn', done:'Đã xong', reserved:'Đang giữ',
    deleted_by_admin:'Đã xóa',
  };
  return map[s] || s;
}
function fmoney(n) {
  n = n || 0;
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'tr';
  if (n >= 1_000) return Math.round(n/1_000) + 'k';
  return n + 'đ';
}
function fmoneyFull(n) {
  n = n || 0;
  return n.toLocaleString('vi-VN') + 'đ';
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}
function avatarBg(name) {
