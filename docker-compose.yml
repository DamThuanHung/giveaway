services:
  postgres:
    image: postgres:15-alpine
    container_name: traotay_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traotay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: traotay_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    container_name: traotay_backend
    restart: unless-stopped
    ports:
      - "3800:3800"
    depends_on:
      - postgres
      - minio
    env_file:
      - .env.docker

volumes:
  postgres_data:
  minio_data:
